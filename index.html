<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>SmartLaunch | NTICX 2026 - Lanzador interactivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .smartwatch-container {
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 800px;
    }

    .smartwatch {
      max-width: 480px;
      width: 100%;
      background: radial-gradient(circle at 30% 20%, #2a2e3f, #151a2a);
      border-radius: 55px;
      padding: 18px 12px 22px 12px;
      box-shadow: 0 30px 40px -20px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.2s;
    }

    .watch-bezel {
      background: #0f1322;
      border-radius: 48px;
      padding: 14px 12px 18px 12px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 5px 12px rgba(0,0,0,0.3);
    }

    .watch-screen {
      background: #01060f;
      border-radius: 38px;
      padding: 1.5rem 1.2rem;
      box-shadow: inset 0 0 0 2px rgba(0,255,255,0.15), 0 8px 20px rgba(0,0,0,0.5);
    }

    .watch-header {
      text-align: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #2c3e50;
      padding-bottom: 0.7rem;
    }

    .time-badge {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #aaffff, #5bc0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-family: monospace;
    }

    .date-badge {
      font-size: 0.7rem;
      color: #7e9ab8;
      margin-top: 4px;
    }

    .greeting {
      font-size: 0.75rem;
      color: #3e7b9b;
      margin-top: 6px;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 1.8rem 0;
    }

    .app-btn {
      background: rgba(20, 30, 45, 0.8);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 1rem 0.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(90, 170, 220, 0.4);
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    }

    .app-btn:hover {
      transform: translateY(-5px);
      background: #1f3b4f;
      border-color: #6bc8ff;
      box-shadow: 0 12px 20px rgba(0,160,255,0.2);
    }

    .app-icon {
      font-size: 2.2rem;
      color: #5bc0ff;
      margin-bottom: 0.4rem;
    }

    .app-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #d4eaff;
      letter-spacing: 0.3px;
    }

    .videos-section {
      margin-top: 1.2rem;
      background: rgba(0, 10, 20, 0.6);
      border-radius: 28px;
      padding: 1rem;
      border: 1px solid #2a4b6e;
    }

    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6c9ebf;
      margin-bottom: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .video-thumb {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .video-item {
      background: #07121e;
      border-radius: 20px;
      overflow: hidden;
      transition: 0.2s;
      border: 1px solid #2a4f6e;
    }

    .video-item iframe {
      width: 100%;
      height: 180px;
      border: none;
      border-bottom: 1px solid #1f3b4f;
    }

    .video-caption {
      padding: 0.5rem;
      font-size: 0.65rem;
      color: #bbd4f0;
      text-align: center;
      font-weight: 500;
    }

    .footer-credit {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.6rem;
      color: #557c9c;
      border-top: 1px solid #1e3a4a;
      padding-top: 0.8rem;
    }

    .footer-credit i {
      margin-right: 4px;
    }

    @media (max-width: 520px) {
      body {
        padding: 1rem;
      }
      .watch-screen {
        padding: 1rem;
      }
      .apps-grid {
        gap: 0.7rem;
      }
      .app-icon {
        font-size: 1.8rem;
      }
      .video-item iframe {
        height: 150px;
      }
    }

    .smartwatch:hover {
      transform: scale(1.01);
    }
  </style>
</head>
<body>
<div class="smartwatch-container">
  <div class="smartwatch">
    <div class="watch-bezel">
      <div class="watch-screen">
        <!-- header estilo reloj -->
        <div class="watch-header">
          <div class="time-badge" id="liveTime">--:--</div>
          <div class="date-badge" id="liveDate"></div>
          <div class="greeting"><i class="fas fa-hand-peace"></i> NTICX · SmartLaunch</div>
        </div>

        <!-- BOTONES LANZADORES -->
        <div class="apps-grid">
          <div class="app-btn" data-url="timeline.html">
            <div class="app-icon"><i class="fas fa-timeline"></i></div>
            <div class="app-label">LÍNEA DE TIEMPO</div>
          </div>
          <div class="app-btn" data-url="history.html">
            <div class="app-icon"><i class="fas fa-history"></i></div>
            <div class="app-label">HISTORIA</div>
          </div>
          <div class="app-btn" data-url="pc.html">
            <div class="app-icon"><i class="fas fa-computer"></i></div>
            <div class="app-label">PC / EVOLUCIÓN</div>
          </div>
        </div>

        <!-- SECCIÓN VIDEOS DE YOUTUBE CON AMBOS VIDEOS FUNCIONALES -->
        <div class="videos-section">
          <div class="section-title">
            <i class="fab fa-youtube"></i> RECURSOS MULTIMEDIA
            <i class="fas fa-play-circle" style="margin-left: auto; font-size:0.7rem;"></i>
          </div>
          <div class="video-thumb">
            <!-- Video 1: Historia de las computadoras -->
            <div class="video-item">
              <iframe 
                width="560" 
                height="315" 
                src="https://www.youtube.com/embed/47_YTOxmS70?si=4Pv1juTrxjU-gaTT" 
                title="Historia de las computadoras | NTICX" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
              </iframe>
              <div class="video-caption">
                <i class="fas fa-history"></i> Historia de las computadoras | NTICX
              </div>
            </div>
            
            <!-- Video 2: Alfabetización digital y tecnología educativa -->
            <div class="video-item">
              <iframe 
                width="560" 
                height="315" 
                src="https://www.youtube.com/embed/U-EkSEdQ0_0?si=djk3YY8bbblOxT-X" 
                title="Alfabetización digital | NTICX" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
              </iframe>
              <div class="video-caption">
                <i class="fas fa-microchip"></i> Alfabetización digital y tecnología educativa | NTICX
              </div>
            </div>
          </div>
        </div>

        <!-- FOOTER -->
        <div class="footer-credit">
          <i class="fas fa-chalkboard-user"></i> Profesor Daniel Villarruel<br>
          <span style="font-size: 0.55rem;">NTICX 2'026 · Todos los derechos reservados</span>
          <div style="margin-top: 5px;">
            <i class="fas fa-copyright"></i> Material educativo · SmartWatch Launcher
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Actualizar hora y fecha
  function updateDateTime() {
    const now = new Date();
    const hours = now.getHours().toString().padStart(2, '0');
    const minutes = now.getMinutes().toString().padStart(2, '0');
    const timeString = `${hours}:${minutes}`;
    const options = { weekday: 'short', day: 'numeric', month: 'short' };
    const dateString = now.toLocaleDateString('es-AR', options).toUpperCase();
    document.getElementById('liveTime').innerText = timeString;
    document.getElementById('liveDate').innerHTML = `<i class="far fa-calendar-alt"></i> ${dateString}`;
  }
  updateDateTime();
  setInterval(updateDateTime, 1000);

  // Botones lanzadores
  const appBtns = document.querySelectorAll('.app-btn');
  appBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      const url = btn.getAttribute('data-url');
      if (url) {
        window.location.href = url;
      }
    });
    
    btn.addEventListener('touchstart', (e) => {
      btn.style.transform = 'scale(0.96)';
      setTimeout(() => { btn.style.transform = ''; }, 120);
    });
    btn.addEventListener('mousedown', (e) => {
      btn.style.transform = 'scale(0.96)';
      setTimeout(() => { btn.style.transform = ''; }, 120);
    });
  });
</script>
</body>
</html>
